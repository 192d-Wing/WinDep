name: image-admin

# Build the WinDep admin image (Cloudscape SPA + FIPS Go backend) on Iron Bank
# UBI10 for amd64 + arm64 on native runners, assemble a multi-arch manifest, push
# to GHCR. Mirrors image.yml (the api image); shares REPO1_USER / REPO1 org secrets.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        required: true
        default: "0.1.1"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/192d-wing
  IMAGE: windep-admin
  TAG: "" # set per-job by the "Resolve image tag" step (git tag / dispatch input, minus leading v)

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            base: registry1.dso.mil/ironbank/redhat/ubi/ubi10:10.2
          - arch: arm64
            runner: ubuntu-24.04-arm # native arm64 runner — no emulation
            base: registry1.dso.mil/ironbank/redhat/ubi/ubi10:10.2-arm64
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Resolve image tag
        run: |
          RAW="${{ github.event.inputs.tag || github.ref_name }}"
          echo "TAG=${RAW#v}" >> "$GITHUB_ENV"

      # Repo One (registry1.dso.mil) intermittently returns "can't talk to a V1
      # container registry" on login and on base-image pull. Retry both so a blip
      # self-heals instead of failing the whole build.
      - name: Log in to Repo One (Iron Bank)
        run: |
          for i in $(seq 1 5); do
            echo "${{ secrets.REPO1 }}" | buildah login -u "${{ secrets.REPO1_USER }}" --password-stdin registry1.dso.mil && exit 0
            echo "::warning::Repo One login attempt $i failed; retrying in 15s"; sleep 15
          done
          echo "::error::Repo One login failed after 5 attempts"; exit 1

      - name: Pre-pull base image (retry transient Iron Bank blips)
        run: |
          for i in $(seq 1 5); do
            buildah pull "${{ matrix.base }}" && exit 0
            echo "::warning::base pull attempt $i failed; retrying in 15s"; sleep 15
          done
          echo "::error::base pull failed after 5 attempts"; exit 1

      - name: Build (${{ matrix.arch }})
        uses: redhat-actions/buildah-build@27e5954dfd56a621f706827f2de689dc955e8711 # v3.0.1
        with:
          image: ${{ env.IMAGE }}
          tags: ${{ env.TAG }}-${{ matrix.arch }}
          archs: ${{ matrix.arch }}
          containerfiles: ./image/Containerfile.admin
          context: ./admin
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            VERSION=${{ env.TAG }}

      - name: Push (${{ matrix.arch }}) to GHCR
        uses: redhat-actions/push-to-registry@94ade333c38ecc0e60e94785125d9a52ca423b37 # v3.0.0
        with:
          image: ${{ env.IMAGE }}
          tags: ${{ env.TAG }}-${{ matrix.arch }}
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve image tag
        run: |
          RAW="${{ github.event.inputs.tag || github.ref_name }}"
          echo "TAG=${RAW#v}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | buildah login -u "${{ github.actor }}" --password-stdin ghcr.io

      - name: Assemble and push manifest
        run: |
          M="${REGISTRY}/${IMAGE}:${TAG}"
          buildah manifest create "$M"
          buildah manifest add "$M" "docker://${REGISTRY}/${IMAGE}:${TAG}-amd64"
          buildah manifest add "$M" "docker://${REGISTRY}/${IMAGE}:${TAG}-arm64"
          buildah manifest push --all "$M" "docker://$M"
