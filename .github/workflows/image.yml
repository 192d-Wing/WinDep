name: image

# Build the FIPS 140-3 API image on Iron Bank UBI10 for amd64 + arm64 using NATIVE
# runners (no QEMU), then assemble a multi-arch manifest and push to GHCR.
# Requires repository secrets REPO1_USER / REPO1 (registry1.dso.mil / Repo One pull).
# GHCR push uses the built-in GITHUB_TOKEN.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        required: true
        default: "0.1.0"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/192d-wing
  IMAGE: windep-api
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            base: registry1.dso.mil/ironbank/redhat/ubi/ubi10:10.2
          - arch: arm64
            runner: ubuntu-24.04-arm # native arm64 runner — no emulation
            base: registry1.dso.mil/ironbank/redhat/ubi/ubi10:10.2-arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to Repo One (Iron Bank)
        run: echo "${{ secrets.REPO1 }}" | buildah login -u "${{ secrets.REPO1_USER }}" --password-stdin registry1.dso.mil

      - name: Build (${{ matrix.arch }})
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          image: ${{ env.IMAGE }}
          tags: ${{ env.TAG }}-${{ matrix.arch }}
          archs: ${{ matrix.arch }}
          containerfiles: ./image/Containerfile
          context: ./api
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            VERSION=${{ env.TAG }}

      - name: Push (${{ matrix.arch }}) to GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        with:
          image: ${{ env.IMAGE }}
          tags: ${{ env.TAG }}-${{ matrix.arch }}
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | buildah login -u "${{ github.actor }}" --password-stdin ghcr.io

      - name: Assemble and push manifest
        run: |
          M="${REGISTRY}/${IMAGE}:${TAG}"
          buildah manifest create "$M"
          buildah manifest add "$M" "docker://${REGISTRY}/${IMAGE}:${TAG}-amd64"
          buildah manifest add "$M" "docker://${REGISTRY}/${IMAGE}:${TAG}-arm64"
          buildah manifest push --all "$M" "docker://$M"
