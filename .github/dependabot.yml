version: 2
updates:
  # Go modules for the telemetry API.
  - package-ecosystem: gomod
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  # GitHub Actions — keeps the SHA pins (and their version comments) current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns: ["*"]

  # Container base images. NOTE: the Containerfile uses ARG-based FROM
  # (BASE_IMAGE / BUILDER_IMAGE) and a private Iron Bank registry, so Dependabot
  # may not raise image PRs here — kept for the public builder tag and future use.
  - package-ecosystem: docker
    directory: /image
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
