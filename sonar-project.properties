# SonarQube / SonarCloud configuration for WinDep.
# Adjust projectKey (and organization for SonarCloud) to your instance.
sonar.projectKey=192d-Wing_WinDep
sonar.organization=192d-wing
sonar.projectName=WinDep

# Analyze the Go service; tests are the *_test.go files.
sonar.sources=api
sonar.tests=api
sonar.test.inclusions=**/*_test.go
sonar.exclusions=**/*_test.go,dev-server/**

# Go coverage produced by `go test -coverprofile=coverage.out` in the api module.
sonar.go.coverage.reportPaths=api/coverage.out

sonar.sourceEncoding=UTF-8
