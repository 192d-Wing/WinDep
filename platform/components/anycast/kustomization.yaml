# Reusable component: inject anycast addresses and the BGP advertise group from an
# overlay's vars.yaml (kind: Variables, name: windep-vars) into the Service and Cilium
# resources. Each overlay supplies its own vars.yaml and includes this component,
# so the replacement wiring lives in exactly one place.
#
# BGP peering is cluster-owned (CiliumBGPClusterConfig + CiliumBGPPeerConfig live on the
# cluster, not here), so there is no ASN/neighbor injection — only the advertise-group
# label that makes the cluster's peer configs export our advertisement.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

replacements:
  # client deploy VIP -> windep-web Service annotation
  - source:
      kind: Variables
      name: windep-vars
      fieldPath: spec.anycastIP
    targets:
      - select:
          kind: Service
          name: windep-web
        fieldPaths:
          - metadata.annotations.[io.cilium/lb-ipam-ips]

  # admin VIP -> windep-admin Service annotation
  - source:
      kind: Variables
      name: windep-vars
      fieldPath: spec.adminIP
    targets:
      - select:
          kind: Service
          name: windep-admin
        fieldPaths:
          - metadata.annotations.[io.cilium/lb-ipam-ips]

  # NOTE: the admin allow-list (NetworkPolicy ingress) is a multi-subnet LIST, so
  # it's set per-site via an overlay patch (see overlays/k3s/admin-netpol-patch.yaml),
  # not a single-value replacement here.

  # LB pool CIDR -> CiliumLoadBalancerIPPool
  - source:
      kind: Variables
      name: windep-vars
      fieldPath: spec.lbPoolCIDR
    targets:
      - select:
          kind: CiliumLoadBalancerIPPool
          name: windep-anycast-pool
        fieldPaths:
          - spec.blocks.0.cidr

  # advertise group -> the label the cluster's BGP peer configs export
  - source:
      kind: Variables
      name: windep-vars
      fieldPath: spec.advertiseGroup
    targets:
      - select:
          kind: CiliumBGPAdvertisement
          name: windep-anycast
        fieldPaths:
          - metadata.labels.advertise

  # RWX StorageClass -> deploy web-root PVC
  - source:
      kind: Variables
      name: windep-vars
      fieldPath: spec.imagesStorageClass
    targets:
      - select:
          kind: PersistentVolumeClaim
          name: windep-web-root
        fieldPaths:
          - spec.storageClassName

  # PVC size -> deploy web-root PVC
  - source:
      kind: Variables
      name: windep-vars
      fieldPath: spec.imagesSize
    targets:
      - select:
          kind: PersistentVolumeClaim
          name: windep-web-root
        fieldPaths:
          - spec.resources.requests.storage
