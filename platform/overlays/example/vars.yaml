# -----------------------------------------------------------------------------
# THE variable file: per-environment BGP ASNs and anycast addresses (+ image).
#
# This is a local-config resource (never applied to the cluster). Kustomize
# `replacements` in kustomization.yaml read these fields and inject them into the
# Service annotation, the Cilium LB IP pool, and the Cilium BGP peering policy.
#
# ASNs are INTEGERS on purpose — the Cilium CRD requires integers, and a plain
# .env/ConfigMap would force them to strings. Keeping them here preserves the type.
# -----------------------------------------------------------------------------
apiVersion: windep.dev/v1
kind: Variables
metadata:
  name: windep-vars
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  # Anycast VIP handed to the Service and allocated from the LB pool below.
  anycastIP: "10.0.100.10"
  # CIDR block the Cilium LB IPAM pool allocates from.
  lbPoolCIDR: "10.0.100.0/24"
  # BGP: this cluster's ASN and the upstream router.
  localASN: 65001
  peerASN: 65000
  peerAddress: "10.0.0.1/32"
