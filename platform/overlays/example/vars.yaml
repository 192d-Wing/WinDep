# -----------------------------------------------------------------------------
# THE variable file: per-environment anycast addresses + BGP advertise group (+ image).
#
# This is a local-config resource (never applied to the cluster). Kustomize
# `replacements` in kustomization.yaml read these fields and inject them into the
# Service annotation, the Cilium LB IP pool, and the Cilium BGP advertisement.
#
# BGP PEERING is cluster-owned: a cluster-wide CiliumBGPClusterConfig peers upstream
# and its CiliumBGPPeerConfigs export any CiliumBGPAdvertisement carrying the label
# `advertise: <advertiseGroup>`. So this file names no ASNs/neighbors — it only opts
# our VIP into advertisement via that group label.
# -----------------------------------------------------------------------------
apiVersion: windep.dev/v1
kind: Variables
metadata:
  name: windep-vars
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  # Anycast VIP handed to the Service and allocated from the LB pool below.
  anycastIP: "10.0.100.10"
  # CIDR block the Cilium LB IPAM pool allocates from.
  lbPoolCIDR: "10.0.100.0/24"
  # Label group the cluster's CiliumBGPPeerConfigs export. Set to match THIS
  # cluster's peer configs (families[].advertisements.matchLabels.advertise).
  advertiseGroup: "windep-anycast"
  # Deploy web-root PVC (config/, images/*.wim, boot/). Needs a ReadWriteMany class.
  imagesStorageClass: "nfs-client"
  imagesSize: "20Gi"
  # Admin (read-write) endpoint: its own VIP + the subnet allowed to reach it.
  adminIP: "10.0.100.11"
  adminSubnet: "10.0.0.0/24"
