apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Full Kubernetes cluster overlay (Cilium as CNI, BGP control plane enabled).
resources:
  - ../../base
  - vars.yaml # local-config source for the anycast component's replacements

components:
  - ../../components/anycast

# Per-environment container image (registry/tag).
images:
  - name: ghcr.io/192d-wing/windep-api
    newTag: "0.1.2"
  - name: ghcr.io/192d-wing/windep-admin
    newTag: "0.1.5"
