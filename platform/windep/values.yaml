# =============================================================================
# WinDep platform — default values.
#
# These defaults mirror the former Kustomize base (safe, generic values). Per-site
# specifics (VIPs, StorageClasses, admin allow-list, image tags, ACME server) live in
# values-k3s.yaml / values-example.yaml — pass one with `-f`:
#
#   helm install windep platform/windep -n windep --create-namespace \
#     -f platform/windep/values-k3s.yaml
# =============================================================================

# Namespace the chart deploys into. The chart also renders a Namespace object
# (namespace.create) so a bare `helm install` works; set create=false if you manage
# the namespace out-of-band (e.g. `helm -n windep --create-namespace`).
namespace:
  name: windep
  create: true

# ---- container images -------------------------------------------------------
images:
  api:
    repo: ghcr.io/192d-wing/windep-api
    tag: "0.1.5"   # 0.1.5 adds app-level mTLS (backward compatible; mTLS off unless configured)
    pullPolicy: IfNotPresent
  admin:
    repo: ghcr.io/192d-wing/windep-admin
    tag: "0.1.22"  # 0.1.20: deploy_event schema rebuild migration (NOT NULL drift) + ingest error logging
    pullPolicy: IfNotPresent
  nginx:
    # Iron Bank hardened nginx (registry1.dso.mil / Repo One — needs the pull secret
    # below). Pin/verify the tag for your ATO. Used by the deploy server in
    # tls.mode=certManager.
    repo: registry1.dso.mil/ironbank/opensource/nginx/nginx
    tag: "1.30.3"
    pullPolicy: IfNotPresent
  caddy:
    # Edge TLS terminator for tls.mode=caddyAcme (ACME TLS-ALPN-01 via certmagic).
    # WinDep's hardened Caddy — Caddy compiled from source (FIPS) on Iron Bank UBI,
    # built by .github/workflows/image-caddy.yml. (Iron Bank ships no Caddy of its own.)
    repo: ghcr.io/192d-wing/windep-caddy
    tag: "2.8.4"
    pullPolicy: IfNotPresent

# imagePullSecrets applied to the web (Iron Bank nginx) pods. Create it with your
# Repo One creds:
#   kubectl -n windep create secret docker-registry repo1-pull \
#     --docker-server=registry1.dso.mil \
#     --docker-username=<REPO1_USER> --docker-password=<REPO1_TOKEN>
imagePullSecrets:
  - repo1-pull

# ---- secret names (referenced; not created by this chart) -------------------
# TLS secrets are populated by cert-manager when certManager.enabled=true; otherwise
# create them yourself (kubectl create secret tls ...). adminAuth/configKey are optional
# app secrets (the deployments mark them optional). repo1Pull is the Iron Bank pull secret.
secrets:
  apiTls: windep-api-tls
  webTls: windep-web-tls
  adminTls: windep-admin-tls
  adminAuth: windep-admin-auth       # key: token   (optional bearer token)
  configKey: windep-admin-config-key # key: key     (base64 32-byte AES key)
  repo1Pull: repo1-pull

# ---- windep-api (telemetry / ZTP resolve) -----------------------------------
api:
  replicas: 2                        # HPA manages this when hpa.enabled; keep >=2 for HA
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    cpuUtilization: 70
  pdb:
    enabled: true
    minAvailable: 1
  # OPA decision endpoint for server-side policy re-eval before releasing creds.
  # Empty = enrollment-only gate. Set to your OPA URL to enforce.
  policyUrl: ""
  policyFailAction: hold             # unreachable/undefined OPA -> refuse (never release creds)
  # Best-effort telemetry forward to the admin datastore (in-cluster Service DNS).
  adminIngestUrl: "https://windep-admin.windep.svc.cluster.local:443/api"
  resources:
    requests: { cpu: 100m, memory: 64Mi, ephemeral-storage: 32Mi }
    limits:   { cpu: 500m, memory: 128Mi, ephemeral-storage: 128Mi }

# ---- windep-web (nginx deploy server) ---------------------------------------
web:
  replicas: 2
  vip: "10.0.100.10"                 # LoadBalancer VIP (anycast) — overridden per site
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: "1", memory: 256Mi }

# ---- windep-admin (Cloudscape UI + RW file API) -----------------------------
admin:
  replicas: 1                        # sole RW writer; strategy is Recreate
  vip: "10.0.100.11"                 # separate admin LoadBalancer VIP
  gomemlimit: "460MiB"               # bound Go heap under the 1Gi cap during multi-GB uploads
  # NetworkPolicy ingress allow-list for the RW admin VIP (source subnets). The api->admin
  # ingest rule is always added on top of this.
  allowedCIDRs:
    - "10.0.0.0/8"
  resources:
    requests: { cpu: 50m, memory: 128Mi, ephemeral-storage: 64Mi }
    limits:   { cpu: "1", memory: 1Gi, ephemeral-storage: 256Mi }

# ---- persistent storage -----------------------------------------------------
storage:
  # Shared payload tree (config/, images/*.wim, boot/). admin mounts RW, api+web RO.
  # Needs a ReadWriteMany StorageClass (NFS, Longhorn share-manager, CephFS...).
  webRoot:
    storageClass: "nfs-client"
    size: "20Gi"
    accessMode: ReadWriteMany
  # admin SQLite datastore (deployment telemetry + audit trail). RWO, single writer.
  adminDb:
    storageClass: "longhorn"
    size: "2Gi"

# ---- networking (Cilium LB + advertisement) ---------------------------------
networking:
  # bgp = CiliumBGPAdvertisement (true anycast/ECMP; peering is cluster-owned).
  # l2  = CiliumL2AnnouncementPolicy (single-node ARP, NOT anycast) — flat-L2 fallback.
  mode: bgp
  lbPoolCIDR: "10.0.100.0/24"        # CiliumLoadBalancerIPPool block the VIPs draw from
  advertiseGroup: "windep-anycast"   # label the cluster's BGP peer configs export (bgp mode)

# ---- TLS mode ---------------------------------------------------------------
# How the public-facing endpoints get their (internal-CA) serving certs:
#
#   certManager  — cert-manager issues certs into secrets.{apiTls,webTls,adminTls},
#                  which the Go apps + nginx mount directly (DNS-01/HTTP-01; see below).
#                  This is the default and matches the original chart.
#
#   caddyAcme    — Caddy is the edge: windep-web runs Caddy (replaces nginx) and the
#                  admin pod gets a Caddy sidecar. Caddy obtains public certs via ACME
#                  TLS-ALPN-01 (certmagic, HA via shared storage) against caddyAcme.server,
#                  and reverse-proxies to the Go apps, which run PLAINTEXT behind it. Use
#                  this when you want automatic TLS-ALPN-01 without DNS creds or an Ingress.
#                  NOTE: the Caddy→backend hop is plaintext on the pod network in this mode;
#                  backend mTLS is a separate change (see the roadmap / follow-up PR).
tls:
  mode: certManager                    # certManager | caddyAcme

# ---- caddyAcme (edge) settings (used when tls.mode=caddyAcme) ----------------
caddyAcme:
  # Internal ACME directory (step-ca / smallstep). MUST be the internal CA whose root is
  # baked into boot.wim — a public Let's Encrypt cert would fail WinPE validation.
  server: "https://ca.internal.example/acme/acme/directory"
  email: "pki@example.internal"
  # Secret holding the internal CA root Caddy trusts when talking to the ACME directory
  # (and, later, backends). Key: ca.crt.  kubectl create secret generic windep-internal-ca --from-file=ca.crt
  caRootSecret: windep-internal-ca
  # certmagic shared storage for HA across the multi-replica deploy edge. Must be RWX and
  # separate from the payload PV (never web-served).
  storage:
    storageClass: "nfs-client"
    size: "1Gi"
  # Public hostnames Caddy serves a cert for (SNI). Match what WinPE / admins resolve.
  hosts:
    web:   ["deploy.example.internal", "windep-api.example.internal"]
    admin: ["admin.deploy.example.internal"]

# ---- backend mTLS (east-west) -----------------------------------------------
# App-level mutual TLS on the machine-to-machine hops: Caddy edge → windep-api, and
# windep-api → windep-admin ingest. Requires tls.mode=caddyAcme. Certs are minted by a
# cert-manager CA issuer off your internal root (independent of the public ACME certs).
#
#   - windep-api serves mTLS on :8443 (VerifyClientCertIfGiven; /api requires a verified
#     client cert — health/metrics stay open). The Caddy edge presents a client cert.
#   - windep-admin runs a DEDICATED mTLS ingest listener on :8444 (RequireAndVerify) for
#     windep-api telemetry, exposed as the ClusterIP Service windep-admin-ingest. The
#     human UI listener is unchanged (no client cert), so browsers keep working.
mtls:
  enabled: false
  # cert-manager CA issuer (kind: CA), backed by a Secret holding the internal CA
  # keypair (tls.crt + tls.key). cert-manager mints server/client leaf certs off it.
  caIssuer:
    name: windep-internal-ca
    kind: Issuer                    # Issuer (namespaced) | ClusterIssuer
    caSecret: windep-internal-ca-key  # Secret (tls.crt+tls.key) = the internal CA
  duration: 720h                    # 30d leaf certs
  renewBefore: 120h                 # 5d

# ---- cert-manager ACME TLS --------------------------------------------------
# When enabled the chart renders a namespaced ACME Issuer + a Certificate per service,
# writing into secrets.{apiTls,webTls,adminTls}. cert-manager must be installed
# cluster-wide. The ACME server MUST be your INTERNAL ACME CA (e.g. step-ca) so issued
# certs chain to the internal root baked into boot.wim — public Let's Encrypt certs would
# NOT validate against WinPE's trust store.
certManager:
  enabled: true
  issuer:
    kind: Issuer                     # Issuer (namespaced) | ClusterIssuer
    name: windep-acme
    acme:
      server: "https://ca.internal.example/acme/acme/directory"  # << set to your internal ACME directory
      email: "pki@example.internal"
      privateKeySecretRef: windep-acme-account-key
      # Raw cert-manager solver list (pass-through). cert-manager supports dns01 and
      # http01 ONLY (not tls-alpn-01). See https://cert-manager.io/docs/configuration/acme/
      #
      # Pick ONE style below (or combine, scoped by selector):
      #
      # (a) DNS-01 — no inbound reachability needed; the ACME server validates a TXT
      #     record. Best for internal/isolated VLANs. rfc2136 shown (internal BIND):
      solvers:
        - dns01:
            rfc2136:
              nameserver: "10.0.0.53:53"
              tsigKeyName: "windep-acme"
              tsigAlgorithm: HMACSHA256
              tsigSecretSecretRef:
                name: windep-acme-tsig
                key: tsig-secret-key
      #
      # (b) HTTP-01 — the ACME server fetches http://<dnsName>/.well-known/acme-challenge/...
      #     on :80. Simpler (no DNS creds), but REQUIRES an Ingress controller: cert-manager
      #     spins up a temporary solver pod + Service + Ingress. This chart ships no Ingress,
      #     so install one (ingress-nginx, Traefik, ...) and make the internal ACME server able
      #     to reach the deploy VIP on :80. Replace the dns01 block above with:
      #
      #   solvers:
      #     - http01:
      #         ingress:
      #           ingressClassName: nginx   # your controller's IngressClass
      #           # serviceType: ClusterIP  # (default; use NodePort if the LB can't hairpin)
      #
      #     # Scope a solver to specific hosts with a selector (e.g. HTTP-01 only for deploy):
      #     - http01:
      #         ingress:
      #           ingressClassName: nginx
      #       selector:
      #         dnsNames:
      #           - deploy.example.internal
  # DNS names (SANs) per service cert. Match the hostnames WinPE / admins resolve.
  certificates:
    duration: 2160h                  # 90d
    renewBefore: 360h                # 15d
    dnsNames:
      api:   ["windep-api.example.internal"]
      web:   ["deploy.example.internal"]
      admin: ["admin.deploy.example.internal"]

# Common labels merged onto every rendered object (in addition to the chart's own).
commonLabels: {}
