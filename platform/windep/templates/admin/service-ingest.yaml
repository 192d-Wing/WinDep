{{- if .Values.mtls.enabled }}
# Internal ClusterIP for the admin mTLS ingest listener (:8444). Deliberately NOT on the
# admin LoadBalancer VIP — telemetry ingest is in-cluster only; windep-api posts here with
# a client cert (mutually authenticated). The human UI stays on the windep-admin VIP.
apiVersion: v1
kind: Service
metadata:
  name: windep-admin-ingest
  namespace: {{ include "windep.namespace" . }}
  labels:
    {{- include "windep.labels" (dict "ctx" $ "component" "admin") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "windep.selectorLabels" (dict "ctx" $ "component" "admin") | nindent 4 }}
  ports:
    - name: ingest
      port: 8444
      targetPort: 8444
      protocol: TCP
{{- end }}
