# The client-facing (read-only) deploy VIP. nginx serves static payloads locally and
# proxies /api/* to the windep-api ClusterIP. The VIP is pinned from the Cilium LB pool
# and advertised (BGP) / announced (L2); the windep.dev/lb-anycast label is what the
# shared LB pool + advertisement select.
apiVersion: v1
kind: Service
metadata:
  name: windep-web
  namespace: {{ include "windep.namespace" . }}
  labels:
    {{- include "windep.labels" (dict "ctx" $ "component" "web") | nindent 4 }}
    windep.dev/lb-anycast: "true"
  annotations:
    io.cilium/lb-ipam-ips: {{ include "windep.lbIPs" (dict "vip" .Values.web.vip "vip6" .Values.web.vip6) | quote }}
spec:
  type: LoadBalancer
  {{- if .Values.web.vip6 }}
  ipFamilyPolicy: PreferDualStack
  ipFamilies: [IPv4, IPv6]
  {{- end }}
  externalTrafficPolicy: Cluster
  selector:
    {{- include "windep.selectorLabels" (dict "ctx" $ "component" "web") | nindent 4 }}
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
