{{- if eq .Values.tls.mode "certManager" }}
# nginx config for the WinDep deploy web server (tls.mode=certManager).
#
# Serves the static payload tree from the PV (config/, images/*.wim, boot/) over TLS
# (internal-CA cert from the web TLS secret), and reverse-proxies /api/* to the
# windep-api Service so a single shared VIP fronts both. Runs as the Iron Bank non-root
# UID (1001), so it listens on 8443 and keeps all writable paths under /tmp.
apiVersion: v1
kind: ConfigMap
metadata:
  name: windep-web-nginx
  namespace: {{ include "windep.namespace" . }}
  labels:
    {{- include "windep.labels" (dict "ctx" $ "component" "web") | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include       /etc/nginx/mime.types;
      # IIS blocks unknown extensions; nginx just needs .wim mapped to a binary type.
      types { application/octet-stream wim swm; }
      default_type  application/octet-stream;

      # keep every writable path off the read-only rootfs
      client_body_temp_path /tmp/client_body;
      proxy_temp_path       /tmp/proxy;
      fastcgi_temp_path     /tmp/fastcgi;
      uwsgi_temp_path       /tmp/uwsgi;
      scgi_temp_path        /tmp/scgi;

      sendfile on;
      tcp_nopush on;
      # large WIM downloads: no buffering, no timeout surprises
      proxy_max_temp_file_size 0;
      client_max_body_size 0;
      access_log /dev/stdout;
      error_log  /dev/stderr;

      server {
        listen 8443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /tls/tls.crt;
        ssl_certificate_key /tls/tls.key;

        root /srv/windep;   # PV: /srv/windep/{config,images,boot}

        # /api/* -> the stateless telemetry sink (now ClusterIP). In-cluster hop;
        # verify off because it's east-west traffic on the pod network.
        location /api/ {
          proxy_pass https://windep-api.{{ include "windep.namespace" . }}.svc.cluster.local:443;
          proxy_ssl_verify off;
          proxy_set_header Host              $host;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
        }

        # everything else is static payload (config JSON, WIMs, boot files)
        location / {
          autoindex off;
        }

        # k8s probes
        location = /healthz { return 200 "ok\n"; }
      }
    }
{{- end }}
