# =============================================================================
# Site: example  —  caddyAcme edge + backend mTLS (production template)
#
# Per-site values overlay (Helm merges it over platform/windep/values.yaml). Copy this
# directory to platform/sites/<your-site>/ and fill in the << >> placeholders.
#
#   helm install windep platform/windep -n windep --create-namespace \
#     -f platform/sites/example/values.yaml
#
# Three things you provide, in THREE places (keys never go in this file / git):
#
#   1. VALUES (here): hostnames, ACME directory URL, and the NAMES of the secrets below.
#
#   2. SECRETS (kubectl — the cert/key material lives in the cluster, out of git):
#        # internal root CA that boot.wim trusts (Caddy trusts the ACME server with it):
#        kubectl -n windep create secret generic windep-internal-ca \
#          --from-file=ca.crt=/path/to/internal-root.pem
#        # mTLS CA keypair (a subordinate off your root) for cert-manager's CA issuer:
#        kubectl -n windep create secret tls windep-internal-ca-key \
#          --cert=/path/to/mtls-ca.crt --key=/path/to/mtls-ca.key
#        # Iron Bank pull secret (windep-web/nginx is not used in caddyAcme, but api/admin
#        # pull from ghcr; create only if your registry needs auth):
#        kubectl -n windep create secret docker-registry repo1-pull ...
#
#   3. DNS (your zone — outside k8s): A records to the anycast VIPs below:
#        deploy.example.internal        A  10.0.100.10   (deploy VIP)
#        windep-api.example.internal    A  10.0.100.10   (same deploy VIP; Caddy routes by SNI)
#        admin.deploy.example.internal  A  10.0.100.11   (admin VIP)
#
# Prereqs: cert-manager + Cilium (LB IPAM + BGP) installed; a hardened Caddy image
# (chart default ghcr.io/192d-wing/windep-caddy, built by image-caddy.yml); an RWX
# StorageClass. See platform/README.md.
# =============================================================================

# ---- TLS: Caddy edge (ACME TLS-ALPN-01) + backend mTLS ----------------------
tls:
  mode: caddyAcme

caddyAcme:
  # Your INTERNAL ACME directory (step-ca / smallstep). Its root MUST be the CA baked
  # into boot.wim — a public Let's Encrypt cert would fail WinPE validation.
  server: "https://<< your-acme-host >>/acme/<< provisioner >>/directory"
  email:  "pki@example.internal"
  # Secret (key: ca.crt) holding the internal root CA — Caddy trusts the ACME server
  # with it. Create it with kubectl (see header); referenced by name only.
  caRootSecret: windep-internal-ca
  # certmagic shared storage for HA across the multi-replica deploy edge (RWX, separate
  # from the payload PV so it is never web-served).
  storage:
    storageClass: "longhorn"
    size: "1Gi"
  # Public hostnames Caddy obtains certs for (SNI). Must match your DNS + boot.wim.
  hosts:
    web:   ["deploy.example.internal", "windep-api.example.internal"]
    admin: ["admin.deploy.example.internal"]

mtls:
  enabled: true
  caIssuer:
    name: windep-internal-ca
    kind: Issuer
    # Secret (tls.crt + tls.key) = the mTLS CA keypair for cert-manager's CA issuer.
    # Create it with kubectl (see header); referenced by name only.
    caSecret: windep-internal-ca-key

# ---- anycast VIPs (pinned from the Cilium LB pool) --------------------------
web:
  vip: "10.0.100.10"

admin:
  vip: "10.0.100.11"
  # Source subnets allowed to reach the read-write admin VIP.
  allowedCIDRs:
    - "10.0.0.0/8"

# ---- storage ----------------------------------------------------------------
storage:
  webRoot:
    # Payload PV (config/, images/*.wim, boot/). Needs a ReadWriteMany StorageClass.
    storageClass: "longhorn"
    size: "20Gi"
  adminDb:
    storageClass: "longhorn"

# ---- networking -------------------------------------------------------------
networking:
  mode: bgp
  lbPoolCIDR: "10.0.100.0/24"
  # Must match the label this cluster's CiliumBGPPeerConfigs export
  # (families[].advertisements.matchLabels.advertise), or the VIP is allocated but
  # never advertised.
  advertiseGroup: "windep-anycast"

# Images inherit the chart defaults (windep-api, windep-admin, windep-caddy). Pin here
# only to override a specific tag, e.g.:
# images:
#   admin: { tag: "0.1.24" }
