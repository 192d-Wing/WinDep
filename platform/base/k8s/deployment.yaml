apiVersion: apps/v1
kind: Deployment
metadata:
  name: windep-api
  namespace: windep
  labels:
    app: windep-api
    app.kubernetes.io/part-of: windep
spec:
  replicas: 2 # HPA manages this; keep >= 2 for anycast/HA
  selector:
    matchLabels:
      app: windep-api
  template:
    metadata:
      labels:
        app: windep-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8443"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false # never calls the k8s API
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: windep-api
      containers:
        - name: api
          image: ghcr.io/192d-wing/windep-api:0.1.0 # replace with your registry
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8443
          env:
            - name: LISTEN_ADDR
              value: ":8443"
            - name: TLS_CERT
              value: "/tls/tls.crt"
            - name: TLS_KEY
              value: "/tls/tls.key"
            # Best-effort forward of deployment telemetry to the admin datastore
            # (logs/audit review). Unset = feature off; failures never affect WinPE.
            - name: ADMIN_INGEST_URL
              value: "https://windep-admin.windep.svc.cluster.local:443/api"
            # Must match the admin's ADMIN_TOKEN when set, or ingest gets 401. Same
            # optional secret both sides read, so hardening stays consistent.
            - name: ADMIN_INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: windep-admin-auth
                  key: token
                  optional: true
            # /api/ztp/resolve reads the config tree (read-only) and decrypts secret
            # fields server-side so the key never ships in boot.wim.
            - name: DATA_DIR
              value: "/srv/windep"
            # Same base64 32-byte key the admin encrypts with (same optional Secret).
            # Unset = resolve returns config as-is (encrypted values unusable → set this
            # once configs are encrypted). MUST equal the admin's CONFIG_KEY.
            - name: CONFIG_KEY
              valueFrom:
                secretKeyRef:
                  name: windep-admin-config-key
                  key: key
                  optional: true
            # OPA decision endpoint. The api re-evaluates policy server-side before it
            # releases credentials (identity is spoofable). Empty = enrollment-only gate;
            # set to your OPA URL (e.g. https://opa.../v1/data/windep/decision) to enforce.
            - name: POLICY_URL
              value: ""
            - name: POLICY_FAIL_ACTION
              value: "hold" # unreachable/undefined OPA → refuse (never release creds)
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
              ephemeral-storage: 128Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
            # Read-only view of the payload PV so resolve can read + decrypt configs.
            - name: web-root
              mountPath: /srv/windep
              readOnly: true
      volumes:
        - name: tls
          secret:
            # TLS cert chaining to the internal CA that WinPE trusts.
            #   kubectl -n windep create secret tls windep-api-tls \
            #     --cert=api.crt --key=api.key
            secretName: windep-api-tls
        - name: web-root
          persistentVolumeClaim:
            claimName: windep-web-root # shared RWX payload PV (admin writes, api reads)
