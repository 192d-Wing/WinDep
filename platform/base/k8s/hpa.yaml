apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: windep-api
  namespace: windep
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: windep-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # CPU-based scaling works out of the box with metrics-server.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # --- Optional: scale on request rate instead of / in addition to CPU. ---
    # Requires prometheus-adapter exposing a custom pod metric from /metrics
    # (fiberprometheus emits http_requests_total). Uncomment once configured:
    # - type: Pods
    #   pods:
    #     metric:
    #       name: http_requests_per_second
    #     target:
    #       type: AverageValue
    #       averageValue: "50"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
