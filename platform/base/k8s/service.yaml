# ClusterIP: windep-api is fronted by the windep-web nginx (which owns the shared
# anycast VIP and proxies /api/* here). The API is still stateless, so the in-cluster
# Service load-balances across all replicas. To give the API its own external VIP
# again, switch type back to LoadBalancer and move the anycast wiring (cilium/ +
# the component's anycastIP replacement) back to this Service.
apiVersion: v1
kind: Service
metadata:
  name: windep-api
  namespace: windep
  labels:
    app: windep-api
spec:
  type: ClusterIP
  selector:
    app: windep-api
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
