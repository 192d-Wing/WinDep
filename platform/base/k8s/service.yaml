apiVersion: v1
kind: Service
metadata:
  name: windep-api
  namespace: windep
  labels:
    app: windep-api
  annotations:
    # Pin the anycast VIP from the Cilium LB IP pool (see deploy/cilium/lb-ippool.yaml).
    io.cilium/lb-ipam-ips: "10.0.100.10"
spec:
  type: LoadBalancer
  # Cluster gives even ECMP distribution across nodes advertising the anycast /32.
  # Switch to Local if you need client-source-IP preservation (DSR-style).
  externalTrafficPolicy: Cluster
  selector:
    app: windep-api
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
