apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests carry sane default values; overlays override the environment-specific
# anycast addresses and BGP advertise group via replacements from a single vars.yaml.
# See platform/overlays/example/. NOTE: BGP *peering* is cluster-owned (a cluster-wide
# CiliumBGPClusterConfig); WinDep only contributes a CiliumBGPAdvertisement.
resources:
  - k8s/namespace.yaml
  - k8s/deployment.yaml
  - k8s/service.yaml
  - k8s/hpa.yaml
  - k8s/poddisruptionbudget.yaml
  # deploy web server (nginx) — serves the WIM/boot/config payload tree from a PV
  # (read-only) and proxies /api/* to windep-api. Client-facing VIP.
  - web/pvc.yaml
  - web/nginx-conf.yaml
  - web/deployment.yaml
  - web/service.yaml
  - web/poddisruptionbudget.yaml
  # admin server (Cloudscape UI + Go API) — the read-write path to the same PV, plus
  # a SQLite datastore for deployment logs + audit trail. Separate VIP, locked down.
  - admin/deployment.yaml
  - admin/service.yaml
  - admin/networkpolicy.yaml
  - admin/db-pvc.yaml
  - cilium/lb-ippool.yaml
  - cilium/bgp-advertisement.yaml
  # cilium/l2announcement.yaml is an ALTERNATIVE to bgp-advertisement.yaml (L2, not anycast).
  # Do not enable both for the same Service — swap it in via an overlay if BGP is unavailable.
