# WinDep admin — the ONLY read-write path to the deploy PV (Cloudscape UI + file
# API). Single replica: it's the sole writer, low-traffic, admin-only. The client
# nginx mounts the same PVC read-only; this one mounts it RW.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: windep-admin
  namespace: windep
  labels:
    app: windep-admin
spec:
  replicas: 1
  strategy:
    type: Recreate # single RW writer — don't run two during rollout
  selector:
    matchLabels:
      app: windep-admin
  template:
    metadata:
      labels:
        app: windep-admin
    spec:
      automountServiceAccountToken: false # never calls the k8s API
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001 # own the PV files so writes succeed
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin
          image: ghcr.io/192d-wing/windep-admin:0.1.1 # remapped per-overlay via images:
          ports:
            - name: https
              containerPort: 8443
          env:
            - name: DATA_DIR
              value: /srv/windep
            - name: TLS_CERT
              value: /tls/tls.crt
            - name: TLS_KEY
              value: /tls/tls.key
            # Optional bearer token; NetworkPolicy is the primary control.
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: windep-admin-auth
                  key: token
                  optional: true
            # Base64 32-byte AES key that encrypts secret config fields (LOCALADMINPASS/
            # DOMAINPASS) at rest on the PV. MUST equal the key baked into boot.wim
            # (Build-WinPE.ps1 -ConfigKey). Optional: unset = creds stored plaintext
            # (still masked in the UI). Only set this once WinPE carries the matching key.
            #   key=$(openssl rand -base64 32)
            #   kubectl -n windep create secret generic windep-admin-config-key --from-literal=key="$key"
            - name: CONFIG_KEY
              valueFrom:
                secretKeyRef:
                  name: windep-admin-config-key
                  key: key
                  optional: true
            # Uploads stream to disk, but a long multi-GB transfer lets Go's heap
            # overshoot the cgroup cap between GCs and OOMKill mid-upload. GOMEMLIMIT
            # makes the runtime collect aggressively as it nears the limit.
            - name: GOMEMLIMIT
              value: "460MiB"
            - name: DB_PATH
              value: /data/windep.db # SQLite: deployment telemetry + audit trail
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet: { path: /healthz, port: 8443, scheme: HTTPS }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: 8443, scheme: HTTPS }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            # GOMEMLIMIT (460MiB) bounds the Go heap; the extra room to 1Gi is
            # reclaimable page cache while writing multi-GB WIMs to the PV. Uploads
            # land on the PV, not ephemeral storage, so the local budget stays small.
            requests: { cpu: 50m, memory: 128Mi, ephemeral-storage: 64Mi }
            limits:   { cpu: "1", memory: 1Gi, ephemeral-storage: 256Mi }
          volumeMounts:
            - name: web-root
              mountPath: /srv/windep # RW: uploads/deletes land here
            - name: db
              mountPath: /data # SQLite datastore (RWO)
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: web-root
          persistentVolumeClaim:
            claimName: windep-web-root
        - name: db
          persistentVolumeClaim:
            claimName: windep-admin-db
        - name: tls
          secret:
            # Serving cert for admin.deploy.oopl.dev.mil, internal CA.
            #   kubectl -n windep create secret tls windep-admin-tls --cert=admin.crt --key=admin.key
            secretName: windep-admin-tls
        - name: tmp
          emptyDir: {}
