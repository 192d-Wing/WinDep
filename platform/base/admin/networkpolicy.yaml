# Lock the read-write admin surface to the admin subnet(s) only. The client
# provisioning VLAN reaches the RO nginx VIP, never this one. This base carries a
# safe default; each site replaces the full ingress from-list via an overlay patch
# (e.g. overlays/k3s/admin-netpol-patch.yaml) to allow one or more admin ranges.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: windep-admin
  namespace: windep
spec:
  podSelector:
    matchLabels:
      app: windep-admin
  policyTypes:
    - Ingress
  ingress:
    # admin UI reachable from the admin subnet(s)
    - from:
        - ipBlock:
            cidr: 10.0.0.0/8 # default; overlays patch this to the real admin range(s)
      ports:
        - protocol: TCP
          port: 8443
    # windep-api pods forward deployment telemetry to /api/ingest. Kept in the base
    # (not just the k3s patch) so every overlay allows ingest even after tightening
    # the ipBlock above. Overlay patches that replace `ingress` must re-include this.
    - from:
        - podSelector:
            matchLabels:
              app: windep-api
      ports:
        - protocol: TCP
          port: 8443
