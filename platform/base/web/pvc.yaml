# PersistentVolumeClaim for the deploy web root (config/ + images/ + boot/).
#
# RWX so every windep-web replica (spread across nodes for anycast HA) mounts the
# SAME content read-only-ish. Requires a ReadWriteMany StorageClass (NFS, Longhorn,
# CephFS, ...). storageClassName + size are injected per-site from vars.yaml by the
# anycast component (imagesStorageClass / imagesSize) — local-path (k3s default) is
# RWO and will NOT bind this claim.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: windep-web-root
  namespace: windep
  labels:
    app.kubernetes.io/part-of: windep
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: REPLACE-with-RWX-storageclass # injected from vars.imagesStorageClass
  resources:
    requests:
      storage: 20Gi # injected from vars.imagesSize
