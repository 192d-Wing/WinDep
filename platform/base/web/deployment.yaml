# WinDep deploy web server — Iron Bank nginx serving the payload tree from the PV
# and reverse-proxying /api/* to windep-api. Multi-replica across nodes so the
# shared anycast VIP is HA; all replicas mount the same RWX PVC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: windep-web
  namespace: windep
  labels:
    app: windep-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: windep-web
  template:
    metadata:
      labels:
        app: windep-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          # Iron Bank hardened nginx (pull via org Repo One creds). Pin/verify the
          # current tag for your ATO; overlays may remap this via images:.
          image: registry1.dso.mil/ironbank/opensource/nginx/nginx:1.30.3
          ports:
            - name: https
              containerPort: 8443
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet: { path: /healthz, port: 8443, scheme: HTTPS }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: 8443, scheme: HTTPS }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: "1", memory: 256Mi }
          volumeMounts:
            - name: web-root
              mountPath: /srv/windep
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: web-root
          persistentVolumeClaim:
            claimName: windep-web-root
        - name: nginx-conf
          configMap:
            name: windep-web-nginx
        - name: tls
          secret:
            # Serving cert for deploy.jhics.org, chaining to the internal CA WinPE trusts.
            #   kubectl -n windep create secret tls windep-web-tls --cert=deploy.crt --key=deploy.key
            secretName: windep-web-tls
        - name: tmp
          emptyDir: {}
