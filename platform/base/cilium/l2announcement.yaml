# ALTERNATIVE to BGP: Cilium L2 announcement (ARP/NDP).
#
# NOTE: L2 announcement is NOT anycast. A single elected node answers ARP for the
# VIP at a time (with failover to another node if it dies). Use this only for a
# flat L2 segment where you cannot peer BGP; prefer bgp-peering.yaml for true
# anycast/ECMP. Do not apply both for the same Service.
#
# Requires:  --set l2announcements.enabled=true  (and kube-proxy replacement)
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: windep-l2
spec:
  serviceSelector:
    matchLabels:
      app: windep-api
  interfaces:
    - "^eth[0-9]+"
  externalIPs: true
  loadBalancerIPs: true
