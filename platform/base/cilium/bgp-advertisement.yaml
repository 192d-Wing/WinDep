# Anycast advertisement via Cilium BGPv2.
#
# This cluster OWNS its BGP peering: a cluster-wide CiliumBGPClusterConfig
# ("k3s-upstream") peers with the upstream router, and its CiliumBGPPeerConfigs
# export every CiliumBGPAdvertisement whose metadata carries the label
# `advertise: <group>` (families[].advertisements.matchLabels).
#
# Therefore WinDep must NOT create its own CiliumBGPClusterConfig / PeerConfig —
# a second cluster config conflicts (cilium.io/ConflictingClusterConfig). WinDep
# contributes exactly ONE advertisement, carrying that label, selecting the
# windep-api Service's LoadBalancer VIP. The VIP is advertised as a /32 from
# every node the cluster config matches -> ECMP/anycast.
#
# The `advertise` label VALUE is injected per-overlay from vars.yaml
# (spec.advertiseGroup) by the anycast component, so a site whose peer configs
# use a different group only edits its vars.yaml.
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: windep-anycast
  labels:
    # REQUIRED: the cluster's peer configs only export ads with this label.
    # Overridden per-site via vars.yaml -> spec.advertiseGroup.
    advertise: k3s-pod-cidrs
spec:
  advertisements:
    - advertisementType: Service
      service:
        addresses:
          - LoadBalancerIP
      selector:
        matchLabels:
          windep.dev/lb-anycast: "true" # advertise both the deploy + admin VIPs
