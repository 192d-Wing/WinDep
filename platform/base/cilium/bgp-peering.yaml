# Anycast advertisement via Cilium BGP.
#
# Every node peers with the upstream router(s) and advertises the LoadBalancer
# VIP (10.0.100.10) as a /32. Because the same /32 is announced from all nodes,
# the upstream performs ECMP across them — that is the anycast behavior. Losing a
# node simply withdraws its path; traffic re-hashes to the survivors.
#
# Requires the Cilium BGP control plane:
#   cilium install ... --set bgpControlPlane.enabled=true
#   (or Helm: --set bgpControlPlane.enabled=true)
#
# This uses the widely-deployed v2alpha1 CiliumBGPPeeringPolicy. On newer Cilium
# (>= 1.16) you may prefer the v2 CiliumBGPClusterConfig / CiliumBGPAdvertisement
# split — the intent (advertise LB /32 from all nodes) is identical.
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPPeeringPolicy
metadata:
  name: windep-anycast-bgp
spec:
  nodeSelector:
    matchLabels: {} # all nodes advertise -> ECMP/anycast
  virtualRouters:
    - localASN: 65001
      exportPodCIDR: false
      serviceSelectors:
        - matchLabels:
            app: windep-api
      neighbors:
        - peerAddress: "10.0.0.1/32" # upstream router
          peerASN: 65000
          # gracefulRestart is recommended so a Cilium restart doesn't blackhole.
          gracefulRestart:
            enabled: true
            restartTimeSeconds: 120
